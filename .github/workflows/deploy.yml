name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-py${{ matrix.python-version }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest requests-mock ruff black
        playwright install chromium
    
    - name: Run tests
      run: |
        ruff check .
        black --check .
        alembic upgrade head
        pytest --cov=. --cov-fail-under=80
      env:
        DATABASE_URL: sqlite:///test.db
        DISCORD_WEBHOOK_URL: ""

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION="dev-$(date +%Y%m%d-%H%M%S)-$(echo $GITHUB_SHA | cut -c1-7)"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "VERSION=$VERSION" >> version.txt
        echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> version.txt
        echo "COMMIT_SHA=${GITHUB_SHA}" >> version.txt
        echo "BRANCH=${GITHUB_REF_NAME}" >> version.txt
    
    - name: Create deployment package
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        
        # デプロイ用ファイルをパッケージ
        tar -czf rakuten-monitor-${VERSION}.tar.gz \
          *.py \
          requirements.txt \
          rakuten-monitor.service \
          rakuten-monitor.timer \
          rakuten_monitor.env \
          systemd_setup.sh \
          security_setup.sh \
          backup_script.sh \
          maintenance_cron.sh \
          logrotate_rakuten_monitor \
          docker-compose.yml \
          migrate_to_postgresql.py \
          version.txt \
          alembic/ \
          alembic.ini \
          alembic.postgresql.ini \
          init-scripts/ \
          .env.staging \
          .env.development
        
        echo "Created package: rakuten-monitor-${VERSION}.tar.gz"
    
    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: deployment-package-${{ steps.version.outputs.VERSION }}
        path: rakuten-monitor-*.tar.gz
        retention-days: 30

  deploy-staging:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'staging' || (github.event_name == 'push' && contains(github.ref, 'refs/tags/'))
    environment: staging
    
    steps:
    - name: Download deployment package
      uses: actions/download-artifact@v4
      with:
        pattern: deployment-package-*
        merge-multiple: true
    
    - name: Deploy to staging
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: ${{ secrets.STAGING_PORT || 22 }}
        script: |
          # ステージング環境でのデプロイ
          cd /opt/rakuten-monitor
          
          # サービス停止
          sudo systemctl stop rakuten-monitor.timer || true
          
          # バックアップ作成
          cp -r . backup-$(date +%Y%m%d-%H%M%S) || true
          
          # アップロード（後続でscp使用）
          echo "Ready for file upload"
    
    - name: Upload files to staging
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: ${{ secrets.STAGING_PORT || 22 }}
        source: "rakuten-monitor-*.tar.gz"
        target: "/opt/rakuten-monitor/"
    
    - name: Extract and restart services
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: ${{ secrets.STAGING_PORT || 22 }}
        script: |
          cd /opt/rakuten-monitor
          
          # アーカイブ展開
          tar -xzf rakuten-monitor-*.tar.gz --strip-components=0
          
          # 依存関係更新
          pip install -r requirements.txt
          
          # マイグレーション実行
          alembic upgrade head
          
          # サービス再起動
          sudo systemctl daemon-reload
          sudo systemctl start rakuten-monitor.timer
          sudo systemctl enable rakuten-monitor.timer
          
          # ステータス確認
          sudo systemctl status rakuten-monitor.timer
          
          echo "Staging deployment completed"

  deploy-production:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    environment: production
    
    steps:
    - name: Download deployment package
      uses: actions/download-artifact@v4
      with:
        name: deployment-package
    
    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # 本番環境へのデプロイ処理
        ls -la rakuten-monitor-*.tar.gz