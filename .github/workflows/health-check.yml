name: Health Check

on:
  schedule:
    # 毎時00分に実行（本番システムの監視）
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv prometheus_client
    
    - name: Check Rakuten site availability
      run: |
        python -c "
        import requests
        import sys
        
        try:
            response = requests.get('https://item.rakuten.co.jp/auc-p-entamestore/c/0000000174/?s=4', timeout=30)
            if response.status_code == 200:
                print('✅ Rakuten site is accessible')
                sys.exit(0)
            else:
                print(f'❌ Rakuten site returned status {response.status_code}')
                sys.exit(1)
        except Exception as e:
            print(f'❌ Failed to access Rakuten site: {e}')
            sys.exit(1)
        "
    
    - name: Check production metrics (if available)
      run: |
        # 本番環境のPrometheusメトリクスをチェック
        # 環境変数 PROMETHEUS_URL が設定されている場合のみ実行
        if [ -n "${{ secrets.PROMETHEUS_URL }}" ]; then
          python -c "
          import requests
          import sys
          
          try:
              response = requests.get('${{ secrets.PROMETHEUS_URL }}/metrics', timeout=10)
              if response.status_code == 200:
                  print('✅ Prometheus metrics accessible')
                  
                  # 基本的なメトリクスの存在確認
                  metrics_text = response.text
                  if 'rakuten_items_fetched_total' in metrics_text:
                      print('✅ Items fetched metric found')
                  if 'rakuten_last_run_status' in metrics_text:
                      print('✅ Last run status metric found')
                  
              else:
                  print(f'⚠️ Prometheus metrics returned status {response.status_code}')
          except Exception as e:
              print(f'⚠️ Could not access Prometheus metrics: {e}')
          "
        else
          echo "⚠️ PROMETHEUS_URL not configured, skipping metrics check"
        fi
    
    - name: Notify on failure
      if: failure()
      run: |
        if [ -n "${{ secrets.DISCORD_ALERT_WEBHOOK_URL }}" ]; then
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "embeds": [{
                   "title": "🚨 Health Check Failed",
                   "description": "GitHub Actions health check detected an issue with the Rakuten monitoring system.",
                   "color": 16711680,
                   "fields": [
                     {
                       "name": "Repository",
                       "value": "${{ github.repository }}",
                       "inline": true
                     },
                     {
                       "name": "Workflow",
                       "value": "${{ github.workflow }}",
                       "inline": true
                     },
                     {
                       "name": "Run ID",
                       "value": "${{ github.run_id }}",
                       "inline": true
                     }
                   ],
                   "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
                 }]
               }' \
               "${{ secrets.DISCORD_ALERT_WEBHOOK_URL }}"
        else
          echo "⚠️ DISCORD_ALERT_WEBHOOK_URL not configured, skipping Discord notification"
        fi