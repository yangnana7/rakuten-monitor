name: CI

on:
  push:
    branches: [ main, develop, "infra/*" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Verify DISCORD_WEBHOOK_URL is set
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error title=Missing Secret::DISCORD_WEBHOOK_URL is not configured in repository secrets."
            exit 1
          fi

  lint:
    needs: check-secrets
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-bdd

    - name: Run linting
      run: |
        ruff check .
        ruff format --check .

  unit-tests:
    runs-on: ubuntu-latest
    needs: [check-secrets, lint]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-bdd

    - name: Run unit tests
      run: |
        export PYTHONPATH="${PYTHONPATH}:."
        pytest -x --tb=short -q

  bdd-tests:
    runs-on: ubuntu-latest
    needs: [check-secrets, unit-tests]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-bdd

    - name: Run BDD tests
      run: |
        export PYTHONPATH="${PYTHONPATH}:."
        pytest tests/bdd_steps/ -q --tb=short

  security-scan:
    runs-on: ubuntu-latest
    needs: [check-secrets, bdd-tests]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit

    - name: Run security scan
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . --severity-level medium

    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: bandit-report.json
