name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        database: ["sqlite", "postgresql"]
      fail-fast: false
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-py${{ matrix.python-version }}-pip-
          ${{ runner.os }}-pip-
    
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-playwright-
    
    - name: Set up PostgreSQL
      if: matrix.database == 'postgresql'
      uses: harmon758/postgresql-action@v1
      with:
        postgresql version: '15'
        postgresql db: rakuten_monitor_test
        postgresql user: test_user
        postgresql password: test_pass
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest requests-mock ruff black pytest-benchmark
    
    - name: Install Playwright browsers
      run: |
        playwright install chromium
        playwright install-deps
    
    - name: Lint with ruff
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        ruff check . --output-format=github --select=E9,F63,F7,F82 --target-version=py39
        # Default set of ruff rules with GitHub annotations
        ruff check . --output-format=github --target-version=py39
    
    - name: Check formatting with black
      run: |
        black --check --diff .
    
    - name: Set up database schema
      run: |
        if [ "${{ matrix.database }}" = "postgresql" ]; then
          export DATABASE_URL="postgresql://test_user:test_pass@localhost/rakuten_monitor_test"
          alembic upgrade head
        else
          export DATABASE_URL="sqlite:///test.db"
          alembic upgrade head
        fi
      env:
        DATABASE_URL: ${{ matrix.database == 'postgresql' && 'postgresql://test_user:test_pass@localhost/rakuten_monitor_test' || 'sqlite:///test.db' }}
    
    - name: Test with pytest
      run: |
        pytest --cov=. --cov-report=xml --cov-report=term-missing -v
      env:
        DATABASE_URL: ${{ matrix.database == 'postgresql' && 'postgresql://test_user:test_pass@localhost/rakuten_monitor_test' || 'sqlite:///test.db' }}
        DISCORD_WEBHOOK_URL: ""
        DISCORD_ALERT_WEBHOOK_URL: ""
        TEST_DATABASE_TYPE: ${{ matrix.database }}
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
    
    - name: Install bandit
      run: |
        pip install bandit[toml]
    
    - name: Run security scan with bandit
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . -f txt
    
    - name: Upload bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json