version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "github-username"  # 実際のGitHubユーザー名に変更
    assignees:
      - "github-username"  # 実際のGitHubユーザー名に変更
    commit-message:
      prefix: "deps"
      include-scope: true
    
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "github-username"  # 実際のGitHubユーザー名に変更
    assignees:
      - "github-username"  # 実際のGitHubユーザー名に変更