version: "3.9"

# ────────────────────────────
# ❶ Secrets  (Swarm 外部で作成しておく)
#    $ docker secret create discord_webhook_url   ./secrets/discord_webhook_url.txt
#    $ docker secret create grafana_admin_user    ./secrets/grafana_admin_user.txt
#    $ docker secret create grafana_admin_password ./secrets/grafana_admin_password.txt
#    $ docker secret create postgres_password     ./secrets/postgres_password.txt
# ────────────────────────────
secrets:
  discord_webhook_url:
    external: true
  grafana_admin_user:
    external: true
  grafana_admin_password:
    external: true
  postgres_password:
    external: true

# ────────────────────────────
# ❷ 永続ボリューム
# ────────────────────────────
volumes:
  db_data:
  grafana_data:

# ────────────────────────────
# ❸ 共有ネットワーク
# ────────────────────────────
networks:
  backend:

# ────────────────────────────
# ❹ サービス定義
# ────────────────────────────
services:

# ▸ 4-1  メインアプリ
  app:
    image: ghcr.io/yangnana7/rakuten-monitor:${TAG:-latest}
    ports:
      - "8000:8000"
    environment:
      # secrets は /run/secrets/… にマウントされる
      DISCORD_WEBHOOK_URL_FILE: /run/secrets/discord_webhook_url
    secrets:
      - discord_webhook_url
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - backend

# ▸ 4-2  TimescaleDB (PostgreSQL)
  db:
    image: timescale/timescaledb:latest-pg14
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: rakuten
      POSTGRES_DB:   rakuten
      # TimescaleDB は POSTGRES_PASSWORD_FILE を認識するので secrets 経由で渡す
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rakuten"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - backend

# ▸ 4-3  Redis キャッシュ
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - backend

# ▸ 4-4  Prometheus
  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./compose/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - backend

# ▸ 4-5  Grafana
  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./compose/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./compose/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./compose/grafana/dashboards/dashboard.yaml:/etc/grafana/provisioning/dashboards/dashboard.yaml:ro
    environment:
      GF_SECURITY_ADMIN_USER_FILE:     /run/secrets/grafana_admin_user
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_admin_password
    secrets:
      - grafana_admin_user
      - grafana_admin_password
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - backend

# ▸ 4-6  cron コンテナ（監視ジョブを定期実行）
  cron:
    image: ghcr.io/yangnana7/rakuten-monitor:${TAG:-latest}
    command: ["cron", "-f"]           # foreground 実行
    environment:
      DISCORD_WEBHOOK_URL_FILE: /run/secrets/discord_webhook_url
    secrets:
      - discord_webhook_url
    depends_on:
      - app
    networks:
      - backend
